<!DOCTYPE html>
<html lang="ja" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChatSpace — リアルタイムチャット</title>
<meta name="description" content="ChatSpace - 友達やチームとリアルタイムでチャットできる無料のチャットアプリ">
<meta property="og:title" content="ChatSpace">
<meta property="og:description" content="友達やチームとリアルタイムでチャットできる無料のチャットアプリ">
<meta property="og:type" content="website">
<link rel="canonical" href="https://chat-app-acount.github.io/chat-app/">
<meta name="google-site-verification" content="mnPUk6etEpDQUZH1vDYiRF1-0qEYr3Ox3F3NEcMzGqg" />
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#7c6af7">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ChatSpace">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
html[data-theme="dark"]{
  --bg:#0f0f13;--surface:#1a1a24;--surface2:#22223a;--surface3:#2a2a42;
  --border:#2e2e4a;--accent:#7c6af7;--accent2:#a78bfa;--accent-glow:rgba(124,106,247,.18);
  --text:#e8e8f0;--text2:#b8b8d0;--muted:#7a7a9a;
  --red:#f87171;--green:#4ade80;--yellow:#fbbf24;--shadow:rgba(0,0,0,.4);
}
html[data-theme="light"]{
  --bg:#f4f4f8;--surface:#ffffff;--surface2:#f0f0f6;--surface3:#e8e8f2;
  --border:#dddde8;--accent:#6c5ce7;--accent2:#8b7cf5;--accent-glow:rgba(108,92,231,.12);
  --text:#1a1a2e;--text2:#4a4a6a;--muted:#9090b0;
  --red:#ef4444;--green:#22c55e;--yellow:#f59e0b;--shadow:rgba(0,0,0,.1);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;overflow:hidden;transition:background .25s,color .25s;}

/* ===== AUTH ===== */
#auth-screen{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:100;}
.auth-card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:40px;width:400px;box-shadow:0 8px 60px var(--shadow);}
.auth-logo{font-size:22px;font-weight:700;color:var(--accent2);letter-spacing:-.5px;margin-bottom:6px;display:flex;align-items:center;gap:8px;}
.auth-sub{color:var(--muted);font-size:13px;margin-bottom:24px;}
.auth-tabs{display:flex;gap:4px;background:var(--bg);border-radius:10px;padding:4px;margin-bottom:22px;}
.auth-tab{flex:1;padding:8px;border:none;background:none;color:var(--muted);font-size:14px;font-weight:500;border-radius:7px;cursor:pointer;transition:all .2s;font-family:'Inter',sans-serif;}
.auth-tab.active{background:var(--surface2);color:var(--text);}
.field{margin-bottom:13px;}
.field label{display:block;font-size:12px;color:var(--muted);margin-bottom:5px;font-weight:600;}
.field input{width:100%;padding:11px 13px;background:var(--bg);border:1.5px solid var(--border);border-radius:10px;color:var(--text);font-size:14px;font-family:'Inter',sans-serif;outline:none;transition:border-color .2s;}
.field input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow);}
.btn-primary{width:100%;padding:12px;background:var(--accent);border:none;border-radius:10px;color:#fff;font-size:14px;font-weight:600;cursor:pointer;transition:all .2s;font-family:'Inter',sans-serif;}
.btn-primary:hover{background:var(--accent2);transform:translateY(-1px);}
.btn-primary:disabled{opacity:.6;cursor:not-allowed;transform:none;}
.auth-divider{display:flex;align-items:center;gap:10px;margin:14px 0;}
.auth-divider-line{flex:1;height:1px;background:var(--border);}
.auth-divider-text{font-size:12px;color:var(--muted);}
.btn-google{width:100%;padding:11px;background:var(--surface2);border:1.5px solid var(--border);border-radius:10px;color:var(--text);font-size:14px;font-weight:500;cursor:pointer;font-family:'Inter',sans-serif;display:flex;align-items:center;justify-content:center;gap:10px;transition:all .2s;}
.btn-google:hover{border-color:var(--accent);background:var(--surface3);}
.btn-google:disabled{opacity:.6;cursor:not-allowed;}
.auth-err{color:var(--red);font-size:13px;margin-top:10px;min-height:18px;}

/* ===== LAYOUT ===== */
#app{display:flex;width:100%;height:100vh;}

/* ===== SIDEBAR ===== */
#sidebar{width:252px;min-width:252px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
.sidebar-header{padding:14px 14px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;}
.sidebar-logo{font-size:15px;font-weight:700;color:var(--accent2);}
.hdr-btn{width:28px;height:28px;border-radius:7px;background:none;border:none;color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;margin-left:auto;}
.hdr-btn:hover{background:var(--surface2);color:var(--text);}
.section-label{padding:14px 14px 6px;font-size:10px;color:var(--muted);font-weight:700;letter-spacing:.9px;text-transform:uppercase;display:flex;align-items:center;justify-content:space-between;}
.add-btn{width:18px;height:18px;border-radius:4px;background:none;border:1px solid var(--border);color:var(--muted);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0;}
.add-btn:hover{background:var(--accent);color:#fff;border-color:var(--accent);}
.room-item{display:flex;align-items:center;gap:9px;padding:8px 14px;cursor:pointer;border-radius:8px;margin:1px 6px;transition:background .12s;}
.room-item:hover{background:var(--surface2);}
.room-item.active{background:var(--accent-glow);}
.room-item.active .room-name{color:var(--accent2);font-weight:600;}
.room-hash{color:var(--muted);font-size:13px;font-weight:700;flex-shrink:0;}
.room-name{font-size:13.5px;font-weight:500;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.room-badge{background:var(--accent);color:#fff;font-size:10px;font-weight:700;min-width:17px;height:17px;border-radius:9px;display:flex;align-items:center;justify-content:center;padding:0 4px;flex-shrink:0;}
.dm-item{display:flex;align-items:center;gap:9px;padding:7px 14px;cursor:pointer;border-radius:8px;margin:1px 6px;transition:background .12s;}
.dm-item:hover{background:var(--surface2);}
.dm-item.active{background:var(--accent-glow);}
.dm-item.active .dm-name{color:var(--accent2);font-weight:600;}
.dm-avatar-wrap{position:relative;flex-shrink:0;}
.dm-avatar{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;}
.dm-name{font-size:13.5px;font-weight:500;}
.sidebar-scroll{overflow-y:auto;flex:1;padding-bottom:8px;}
.sidebar-scroll::-webkit-scrollbar{width:3px;}
.sidebar-scroll::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
.sidebar-footer{border-top:1px solid var(--border);padding:10px 14px;display:flex;align-items:center;gap:9px;cursor:pointer;transition:background .15s;}
.sidebar-footer:hover{background:var(--surface2);}
.me-avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;flex-shrink:0;position:relative;overflow:hidden;}
.me-avatar img{width:100%;height:100%;object-fit:cover;border-radius:50%;}
.me-online{width:9px;height:9px;border-radius:50%;background:var(--green);border:2px solid var(--surface);position:absolute;bottom:-1px;right:-1px;}
.me-info{flex:1;min-width:0;display:flex;flex-direction:column;gap:1px;}
.me-name-label{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.3;}
.me-tag{font-size:10px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.3;}
.footer-btn{background:none;border:none;color:var(--muted);cursor:pointer;padding:4px;transition:color .2s;flex-shrink:0;display:flex;align-items:center;}
.footer-btn:hover{color:var(--red);}
.sidebar-empty{padding:10px 14px;font-size:12px;color:var(--muted);line-height:1.6;}

/* ===== MAIN ===== */
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.chat-header{padding:13px 22px 10px;border-bottom:1px solid var(--border);background:var(--surface);}
.chat-header-top{display:flex;align-items:center;gap:11px;}
.chat-header-icon{color:var(--muted);display:flex;align-items:center;flex-shrink:0;}
.chat-header-name{font-size:15px;font-weight:700;}
.chat-header-desc{font-size:12px;color:var(--muted);}
.chat-header-actions{margin-left:auto;display:flex;gap:6px;}
.icon-btn{background:none;border:none;color:var(--muted);cursor:pointer;padding:6px 7px;border-radius:7px;transition:all .2s;display:flex;align-items:center;}
.icon-btn:hover{background:var(--surface2);color:var(--text);}
.room-id-bar{display:flex;align-items:center;gap:8px;padding:5px 22px 7px;background:var(--surface);border-bottom:1px solid var(--border);}
.room-id-label{font-size:10px;color:var(--muted);font-weight:700;letter-spacing:.5px;text-transform:uppercase;white-space:nowrap;}
.room-id-value{font-size:11px;font-family:monospace;color:var(--accent2);background:var(--bg);border:1px solid var(--border);border-radius:5px;padding:2px 8px;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.room-id-copy{background:none;border:none;color:var(--muted);cursor:pointer;display:flex;align-items:center;padding:3px 5px;border-radius:5px;transition:all .2s;flex-shrink:0;}
.room-id-copy:hover{background:var(--surface2);color:var(--accent);}

/* messages */
#messages{flex:1;overflow-y:auto;padding:20px 22px;display:flex;flex-direction:column;gap:2px;}
#messages::-webkit-scrollbar{width:5px;}
#messages::-webkit-scrollbar-track{background:transparent;}
#messages::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
.msg-group{margin-bottom:12px;}
.msg-row{display:flex;align-items:flex-start;gap:11px;}
.msg-avatar{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;flex-shrink:0;margin-top:2px;overflow:hidden;}
.msg-avatar img{width:100%;height:100%;object-fit:cover;}
.msg-content{flex:1;min-width:0;}
.msg-meta{display:flex;align-items:baseline;gap:7px;margin-bottom:3px;}
.msg-author{font-size:13.5px;font-weight:700;}
.msg-time{font-size:10.5px;color:var(--muted);}
.msg-bubble{font-size:13.5px;line-height:1.6;color:var(--text2);background:var(--surface2);border-radius:4px 13px 13px 13px;padding:7px 11px;display:inline-block;max-width:460px;word-break:break-word;}
.msg-continuation{padding-left:45px;margin-bottom:2px;}
.msg-continuation .msg-bubble{border-radius:13px;}
.msg-own-row{display:flex;align-items:flex-start;gap:11px;flex-direction:row-reverse;}
.msg-own-content{text-align:right;flex:1;min-width:0;}
.msg-own-meta{display:flex;align-items:baseline;gap:7px;margin-bottom:3px;justify-content:flex-end;}
.msg-own-bubble{font-size:13.5px;line-height:1.6;background:var(--accent);color:#fff;border-radius:13px 4px 13px 13px;padding:7px 11px;display:inline-block;max-width:460px;text-align:left;word-break:break-word;}
.msg-own-continuation{text-align:right;margin-bottom:2px;}
.msg-own-continuation .msg-own-bubble{border-radius:13px;}
.system-msg{text-align:center;font-size:12px;color:var(--muted);padding:6px;margin:6px 0;}
.system-msg span{background:var(--surface2);padding:3px 11px;border-radius:10px;}

/* reply quote */
.reply-quote{font-size:11.5px;color:var(--muted);background:var(--surface3);border-left:3px solid var(--accent);border-radius:0 6px 6px 0;padding:4px 8px;margin-bottom:4px;max-width:360px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;cursor:pointer;}
.reply-quote:hover{color:var(--text);}
.reply-bar{display:flex;align-items:center;gap:8px;padding:8px 22px;background:var(--surface2);border-top:1px solid var(--border);font-size:12px;color:var(--muted);}
.reply-bar-text{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.reply-bar-close{background:none;border:none;color:var(--muted);cursor:pointer;display:flex;align-items:center;transition:color .2s;}
.reply-bar-close:hover{color:var(--red);}

/* reactions */
.msg-reactions{display:flex;flex-wrap:wrap;gap:4px;margin-top:4px;}
.reaction-btn{background:var(--surface3);border:1px solid var(--border);border-radius:10px;padding:2px 7px;font-size:12px;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:3px;color:var(--text2);}
.reaction-btn:hover,.reaction-btn.mine{background:var(--accent-glow);border-color:var(--accent);color:var(--accent2);}
.reaction-count{font-size:11px;font-weight:600;}
.add-reaction-btn{background:none;border:1px solid var(--border);border-radius:10px;padding:2px 6px;font-size:12px;cursor:pointer;color:var(--muted);transition:all .15s;}
.add-reaction-btn:hover{border-color:var(--accent);color:var(--accent);}
.msg-actions{display:none;position:absolute;right:0;top:-28px;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:3px;gap:2px;box-shadow:0 2px 12px var(--shadow);}
.msg-wrap{position:relative;}
.msg-wrap:hover .msg-actions{display:flex;}
.msg-action-btn{background:none;border:none;color:var(--muted);cursor:pointer;padding:4px 6px;border-radius:5px;font-size:12px;transition:all .15s;display:flex;align-items:center;}
.msg-action-btn:hover{background:var(--surface2);color:var(--text);}
.emoji-picker{position:absolute;right:0;top:100%;margin-top:4px;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:8px;display:flex;flex-wrap:wrap;gap:4px;width:180px;box-shadow:0 4px 20px var(--shadow);z-index:50;}
.emoji-opt{background:none;border:none;cursor:pointer;font-size:18px;padding:4px;border-radius:6px;transition:background .15s;}
.emoji-opt:hover{background:var(--surface2);}

/* read receipts */
.read-receipt{font-size:10px;color:var(--muted);text-align:right;margin-top:1px;}

/* typing */
.typing-indicator{padding:4px 22px 6px;font-size:12px;color:var(--muted);min-height:20px;display:flex;align-items:center;gap:6px;}
.typing-dots{display:flex;gap:3px;}
.typing-dot{width:5px;height:5px;border-radius:50%;background:var(--muted);animation:tdot 1.2s infinite;}
.typing-dot:nth-child(2){animation-delay:.2s;}
.typing-dot:nth-child(3){animation-delay:.4s;}
@keyframes tdot{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-4px)}}

/* input */
.input-area{padding:8px 22px 14px;border-top:1px solid var(--border);background:var(--surface);}
.input-wrap{display:flex;align-items:flex-end;gap:9px;background:var(--bg);border:1.5px solid var(--border);border-radius:13px;padding:9px 13px;transition:border-color .2s;}
.input-wrap:focus-within{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow);}
#msg-input{flex:1;background:none;border:none;outline:none;color:var(--text);font-size:14px;font-family:'Inter',sans-serif;resize:none;max-height:120px;line-height:1.5;}
#msg-input::placeholder{color:var(--muted);}
.send-btn{background:var(--accent);border:none;width:33px;height:33px;border-radius:8px;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0;}
.send-btn:hover{background:var(--accent2);transform:scale(1.06);}

/* empty */
#empty-state{flex:1;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px;color:var(--muted);}
.empty-icon{color:var(--border);}
.empty-title{font-size:19px;font-weight:700;color:var(--text);}
.empty-sub{font-size:13px;text-align:center;line-height:1.7;max-width:300px;}

/* ===== ACCOUNT PAGE ===== */
#account-page{flex:1;display:none;flex-direction:column;overflow-y:auto;background:var(--bg);}
.account-inner{max-width:560px;margin:0 auto;padding:28px 22px;}
.page-back{display:flex;align-items:center;gap:8px;margin-bottom:22px;cursor:pointer;color:var(--muted);font-size:13px;font-weight:500;width:fit-content;transition:color .2s;}
.page-back:hover{color:var(--text);}
.page-title{font-size:20px;font-weight:700;margin-bottom:3px;}
.page-sub{font-size:13px;color:var(--muted);margin-bottom:22px;}
.acct-section{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:20px;margin-bottom:14px;}
.acct-section-title{font-size:10px;font-weight:700;color:var(--muted);letter-spacing:.7px;text-transform:uppercase;margin-bottom:14px;}
.acct-avatar-row{display:flex;align-items:center;gap:14px;margin-bottom:16px;}
.acct-avatar-big{width:64px;height:64px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:700;color:#fff;flex-shrink:0;overflow:hidden;}
.acct-avatar-big img{width:100%;height:100%;object-fit:cover;}
.acct-avatar-name{font-size:16px;font-weight:700;margin-bottom:2px;}
.acct-avatar-sub{font-size:12px;color:var(--muted);}
.color-swatches{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px;}
.color-swatch{width:24px;height:24px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:transform .15s,border-color .15s;}
.color-swatch:hover{transform:scale(1.18);}
.color-swatch.selected{border-color:var(--text);}
.acct-field{margin-bottom:12px;}
.acct-field label{display:block;font-size:12px;color:var(--muted);margin-bottom:5px;font-weight:600;}
.acct-field input{width:100%;padding:10px 12px;background:var(--bg);border:1.5px solid var(--border);border-radius:9px;color:var(--text);font-size:14px;font-family:'Inter',sans-serif;outline:none;transition:border-color .2s;}
.acct-field input:focus{border-color:var(--accent);}
.btn-save{padding:10px 20px;background:var(--accent);border:none;border-radius:9px;color:#fff;font-size:14px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;transition:all .2s;}
.btn-save:hover{background:var(--accent2);}
.btn-danger{padding:10px 20px;background:none;border:1.5px solid var(--red);border-radius:9px;color:var(--red);font-size:14px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;transition:all .2s;}
.btn-danger:hover{background:var(--red);color:#fff;}
.theme-row{display:flex;gap:10px;}
.theme-opt{flex:1;padding:14px 10px;border:1.5px solid var(--border);border-radius:10px;cursor:pointer;text-align:center;transition:all .2s;background:var(--bg);}
.theme-opt:hover{border-color:var(--accent);}
.theme-opt.selected{border-color:var(--accent);background:var(--accent-glow);}
.theme-opt-icon{margin-bottom:5px;color:var(--muted);display:flex;justify-content:center;}
.theme-opt.selected .theme-opt-icon{color:var(--accent);}
.theme-opt-label{font-size:13px;font-weight:600;}
.joined-room-item{display:flex;align-items:center;gap:9px;padding:10px 0;border-bottom:1px solid var(--border);}
.joined-room-item:last-child{border-bottom:none;}
.joined-room-info{flex:1;min-width:0;}
.joined-room-name{font-size:13.5px;font-weight:500;}
.joined-room-id{font-size:11px;color:var(--muted);font-family:monospace;margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.jr-btn{padding:4px 10px;background:none;border:1px solid var(--border);border-radius:6px;color:var(--muted);font-size:11px;cursor:pointer;font-family:'Inter',sans-serif;transition:all .2s;white-space:nowrap;margin-left:4px;}
.jr-btn:hover{border-color:var(--accent);color:var(--accent);}
.jr-btn.danger:hover{border-color:var(--red);color:var(--red);}
.stat-row{display:flex;gap:10px;}
.stat-card{flex:1;background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:13px;text-align:center;}
.stat-num{font-size:20px;font-weight:700;color:var(--accent2);}
.stat-lbl{font-size:11px;color:var(--muted);margin-top:2px;}
.auth-ok{color:var(--green);font-size:13px;margin-top:8px;min-height:16px;}

/* ===== MODAL ===== */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;z-index:200;opacity:0;pointer-events:none;transition:opacity .2s;}
.modal-overlay.show{opacity:1;pointer-events:all;}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:26px;width:360px;transform:scale(.95);transition:transform .2s;box-shadow:0 8px 40px var(--shadow);}
.modal-overlay.show .modal{transform:scale(1);}
.modal-title{font-size:15px;font-weight:700;margin-bottom:14px;}
.modal-field{margin-bottom:12px;}
.modal-field label{display:block;font-size:12px;color:var(--muted);margin-bottom:5px;font-weight:600;}
.modal-field input{width:100%;padding:10px 12px;background:var(--bg);border:1.5px solid var(--border);border-radius:8px;color:var(--text);font-size:14px;font-family:'Inter',sans-serif;outline:none;transition:border-color .2s;}
.modal-field input:focus{border-color:var(--accent);}
.modal-btns{display:flex;gap:9px;margin-top:14px;}
.btn-cancel{flex:1;padding:10px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--muted);font-size:14px;cursor:pointer;font-family:'Inter',sans-serif;}
.btn-cancel:hover{background:var(--surface3);}
.btn-confirm{flex:1;padding:10px;background:var(--accent);border:none;border-radius:8px;color:#fff;font-size:14px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;}
.btn-confirm:hover{background:var(--accent2);}
.join-err{color:var(--red);font-size:13px;margin-top:8px;min-height:16px;}
.join-preview{display:none;margin-top:10px;padding:11px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);}
.join-preview.show{display:block;}
.join-preview-name{font-size:14px;font-weight:700;margin-bottom:2px;}
.join-preview-desc{font-size:12px;color:var(--muted);}

/* ===== MEMBERS ===== */
#members-panel{width:200px;min-width:200px;background:var(--surface);border-left:1px solid var(--border);overflow-y:auto;display:none;}
#members-panel.show{display:block;}
.members-header{padding:14px 14px 10px;font-size:10px;color:var(--muted);font-weight:700;letter-spacing:.8px;text-transform:uppercase;border-bottom:1px solid var(--border);}
.member-item{display:flex;align-items:center;gap:9px;padding:7px 12px;transition:background .12s;border-radius:6px;margin:2px 4px;}
.member-item:hover{background:var(--surface2);}
.member-avatar{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;flex-shrink:0;position:relative;overflow:hidden;}
.member-avatar img{width:100%;height:100%;object-fit:cover;}
.member-dot{width:8px;height:8px;border-radius:50%;background:var(--green);border:2px solid var(--surface);position:absolute;bottom:-1px;right:-1px;}
.member-name{font-size:12.5px;font-weight:500;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.member-me{font-size:10px;color:var(--muted);flex-shrink:0;}

/* ===== TOAST ===== */
.toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%) translateY(14px);background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px 16px;font-size:13px;color:var(--text);opacity:0;transition:all .3s;z-index:300;display:flex;align-items:center;gap:8px;box-shadow:0 4px 20px var(--shadow);pointer-events:none;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.toast-dot{width:7px;height:7px;border-radius:50%;background:var(--green);flex-shrink:0;}
.toast-dot.warn{background:var(--yellow);}

/* loading */
#loading-screen{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:200;flex-direction:column;gap:16px;}
.loading-logo{font-size:24px;font-weight:700;color:var(--accent2);}
.loading-spin{width:24px;height:24px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}

@media(max-width:720px){#sidebar{width:200px;min-width:200px;}#members-panel{display:none!important;}.auth-card{width:95vw;padding:26px 16px;}.account-inner{padding:18px 12px;}}
</style>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getAuth, onAuthStateChanged, signInWithPopup, GoogleAuthProvider,
  createUserWithEmailAndPassword, signInWithEmailAndPassword,
  updateProfile, signOut, deleteUser, updatePassword }
  from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
import { getFirestore, collection, doc, setDoc, getDoc, getDocs,
  addDoc, onSnapshot, query, orderBy, serverTimestamp,
  updateDoc, arrayUnion, arrayRemove, deleteDoc, where, limit }
  from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

// ===== FIREBASE CONFIG =====
const firebaseConfig = {
  apiKey: "AIzaSyDq8dDcnA2JHC3Xi7seXFIkidwmHoI7Ihg",
  authDomain: "chat-app-44d95.firebaseapp.com",
  projectId: "chat-app-44d95",
  storageBucket: "chat-app-44d95.firebasestorage.app",
  messagingSenderId: "689926338538",
  appId: "1:689926338538:web:33281528795be00371a493"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const googleProvider = new GoogleAuthProvider();

// ===== STATE =====
const COLORS = ['#7c6af7','#f472b6','#34d399','#fb923c','#60a5fa','#a78bfa','#f59e0b','#10b981','#ef4444','#06b6d4'];
let currentUser = null;
let currentRoom = null;
let currentRoomType = null;
let membersOpen = false;
let replyTo = null;
let unsubMessages = null;
let unsubRooms = null;
let unsubDMs = null;
let typingTimeout = null;
let userCache = {};

// ===== THEME =====
function getTheme(){ return localStorage.getItem('cs_theme') || 'dark'; }
function setTheme(t){
  localStorage.setItem('cs_theme', t);
  document.documentElement.setAttribute('data-theme', t);
  const d = document.getElementById('theme-dark-opt');
  const l = document.getElementById('theme-light-opt');
  if(d) d.classList.toggle('selected', t === 'dark');
  if(l) l.classList.toggle('selected', t === 'light');
}
window.setTheme = setTheme;
setTheme(getTheme());

// ===== AUTH =====
window.switchTab = function(mode) {
  document.querySelectorAll('.auth-tab').forEach((t,i) =>
    t.classList.toggle('active', (mode==='login'&&i===0)||(mode==='signup'&&i===1)));
  document.getElementById('display-name-field').style.display = mode==='signup' ? 'block' : 'none';
  document.getElementById('auth-btn').textContent = mode==='login' ? 'ログイン' : '登録する';
  document.getElementById('auth-err').textContent = '';
  document.getElementById('auth-btn').dataset.mode = mode;
};
document.getElementById('auth-btn').dataset.mode = 'login';

window.doEmailAuth = async function() {
  const mode = document.getElementById('auth-btn').dataset.mode;
  const email = document.getElementById('auth-email').value.trim();
  const pass = document.getElementById('auth-pass').value;
  const displayName = document.getElementById('auth-display-name').value.trim();
  const err = document.getElementById('auth-err');
  const btn = document.getElementById('auth-btn');
  if(!email || !pass){ err.textContent = 'メールとパスワードを入力してください'; return; }
  btn.disabled = true;
  try {
    if(mode === 'signup') {
      if(!displayName){ err.textContent = '表示名を入力してください'; btn.disabled=false; return; }
      // 名前の重複チェック
      const nameCheck = query(collection(db, 'users'), where('name', '==', displayName), limit(1));
      const nameSnap = await getDocs(nameCheck);
      if(!nameSnap.empty){ err.textContent = 'この名前は既に使われています。別の名前にしてください'; btn.disabled=false; return; }
      const cred = await createUserWithEmailAndPassword(auth, email, pass);
      await updateProfile(cred.user, { displayName });
      await saveUserProfile(cred.user, displayName, null);
    } else {
      await signInWithEmailAndPassword(auth, email, pass);
    }
  } catch(e) {

};

window.doGoogleAuth = async function() {
  const btn = document.getElementById('google-btn');
  btn.disabled = true;

function getFriendlyError(code) {
  const map = {
    'auth/email-already-in-use': 'このメールは既に登録されています',
    'auth/invalid-email': 'メールアドレスが正しくありません',
    'auth/weak-password': 'パスワードは6文字以上にしてください',
    'auth/user-not-found': 'アカウントが見つかりません',
    'auth/wrong-password': 'パスワードが違います',
    'auth/invalid-credential': 'メールまたはパスワードが違います',
    'auth/popup-closed-by-user': 'ログインがキャンセルされました',
  };
  return map[code] || 'エラーが発生しました: ' + code;
}

async function saveUserProfile(user, displayName, photoURL) {
  const color = COLORS[Math.floor(Math.random() * COLORS.length)];
  const ref = doc(db, 'users', user.uid);
  const snap = await getDoc(ref);
  if(!snap.exists()) {
    await setDoc(ref, {
      uid: user.uid,
      name: displayName || user.email,
      email: user.email,
      photoURL: photoURL || null,
      color: color,
      createdAt: serverTimestamp()
    });
  }
}

// ===== MESSAGES =====
function listenMessages(roomId, type) {
  const colPath = type === 'room'
    ? collection(db, 'rooms', roomId, 'messages')
    : collection(db, 'dms', roomId, 'messages');
  const q = query(colPath, orderBy('ts', 'asc'));
  const container = document.getElementById('messages');
  container.innerHTML = '';
  if(unsubMessages) unsubMessages();
  unsubMessages = onSnapshot(q, async snap => {
    const atBot = container.scrollHeight - container.scrollTop - container.clientHeight < 100;
    container.innerHTML = '';
    let prev = null;
    for(const d of snap.docs) {
      const msg = { id: d.id, ...d.data() };
      if(msg.type === 'system') {
        const s = document.createElement('div'); s.className = 'system-msg';
        s.innerHTML = '<span>' + escH(msg.text) + '</span>';
        container.appendChild(s); prev = null; continue;
      }
      const u = await getUser(msg.author);
      const own = msg.author === currentUser.uid;
      const same = prev === msg.author;
      const wrap = document.createElement('div'); wrap.className = 'msg-wrap';
      if(!same) {
        const group = document.createElement('div'); group.className = 'msg-group';
        const row = document.createElement('div'); row.className = own ? 'msg-own-row' : 'msg-row';
        const av = renderAvatar(u, 34);
        const ct = document.createElement('div'); ct.className = own ? 'msg-own-content' : 'msg-content';
        // reply quote
        if(msg.replyTo) {
          const rq = document.createElement('div'); rq.className = 'reply-quote';
          rq.textContent = msg.replyToText || '元のメッセージ';
          ct.appendChild(rq);
        }
        const meta = document.createElement('div'); meta.className = own ? 'msg-own-meta' : 'msg-meta';
        meta.innerHTML = '<span class="msg-author">' + escH(u.name) + '</span><span class="msg-time">' + fmtTime(msg.ts) + '</span>';
        const bubble = document.createElement('div'); bubble.className = own ? 'msg-own-bubble' : 'msg-bubble';
        bubble.textContent = msg.text;
        ct.appendChild(meta); ct.appendChild(bubble);
        // reactions
        if(msg.reactions && Object.keys(msg.reactions).length > 0) {
          const rxRow = renderReactions(msg, d.id, type);
          ct.appendChild(rxRow);
        }
        // read receipt for own
        if(own && msg.readBy && msg.readBy.length > 1) {
          const rr = document.createElement('div'); rr.className = 'read-receipt';
          rr.textContent = '既読 ' + (msg.readBy.length - 1);
          ct.appendChild(rr);
        }
        row.appendChild(av); row.appendChild(ct);
        group.appendChild(row);
        // action buttons
        const actions = buildActions(msg, d.id, type, own);
        wrap.appendChild(group); wrap.appendChild(actions);
      } else {
        const cont = document.createElement('div'); cont.className = own ? 'msg-own-continuation' : 'msg-continuation';
        const bubble = document.createElement('div'); bubble.className = own ? 'msg-own-bubble' : 'msg-bubble';
        bubble.textContent = msg.text;
        cont.appendChild(bubble);
        if(msg.reactions && Object.keys(msg.reactions).length > 0) cont.appendChild(renderReactions(msg, d.id, type));
        if(own && msg.readBy && msg.readBy.length > 1) {
          const rr = document.createElement('div'); rr.className = 'read-receipt';
          rr.textContent = '既読 ' + (msg.readBy.length - 1);
          cont.appendChild(rr);
        }
        const actions = buildActions(msg, d.id, type, own);
        wrap.appendChild(cont); wrap.appendChild(actions);
      }
      container.appendChild(wrap);
      prev = msg.author;
    }
    if(atBot) container.scrollTop = container.scrollHeight;
    // ルームを開いているときだけ既読にする
    if(!document.hidden) {
      snap.docs.forEach(d => {
        const msg = d.data();
        if(msg.type !== 'system' && msg.author !== currentUser.uid) {
          markRead(d.id, type);
        }
      });
    }
    // notification
    const last = snap.docs[snap.docs.length - 1];
    if(last) {
      const lm = last.data();
      if(lm.author !== currentUser.uid && document.hidden && Notification.permission === 'granted') {
        const u2 = await getUser(lm.author);
        new Notification(u2.name, { body: lm.text, icon: u2.photoURL || '' });
      }
    }
  });
}

function buildActions(msg, msgId, type, own) {
  const actions = document.createElement('div'); actions.className = 'msg-actions';
  // reply
  const replyBtn = document.createElement('button'); replyBtn.className = 'msg-action-btn'; replyBtn.title = '返信';
  replyBtn.innerHTML = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 14 4 9 9 4"/><path d="M20 20v-7a4 4 0 00-4-4H4"/></svg>';
  replyBtn.onclick = () => setReply(msgId, msg.text);
  actions.appendChild(replyBtn);
  // react
  const reactBtn = document.createElement('button'); reactBtn.className = 'msg-action-btn'; reactBtn.title = 'リアクション';
  reactBtn.innerHTML = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/></svg>';
  reactBtn.onclick = (e) => { e.stopPropagation(); toggleEmojiPicker(reactBtn, msgId, type); };
  actions.appendChild(reactBtn);
  return actions;
}

function renderReactions(msg, msgId, type) {
  const row = document.createElement('div'); row.className = 'msg-reactions';
  const rx = msg.reactions || {};
  Object.entries(rx).forEach(([emoji, uids]) => {
    if(!uids || uids.length === 0) return;
    const btn = document.createElement('button'); btn.className = 'reaction-btn';
    if(uids.includes(currentUser.uid)) btn.classList.add('mine');
    btn.innerHTML = emoji + ' <span class="reaction-count">' + uids.length + '</span>';
    btn.onclick = () => toggleReaction(msgId, emoji, type);
    row.appendChild(btn);
  });
  return row;
}

function toggleEmojiPicker(btn, msgId, type) {
  document.querySelectorAll('.emoji-picker').forEach(p => p.remove());
  const emojis = ['👍','❤️','😂','😮','😢','🔥','✅','🎉'];
  const picker = document.createElement('div'); picker.className = 'emoji-picker';
  emojis.forEach(e => {
    const b = document.createElement('button'); b.className = 'emoji-opt'; b.textContent = e;
    b.onclick = () => { toggleReaction(msgId, e, type); picker.remove(); };
    picker.appendChild(b);
  });
  btn.parentElement.appendChild(picker);
  setTimeout(() => document.addEventListener('click', () => picker.remove(), { once: true }), 0);
}

async function toggleReaction(msgId, emoji, type) {
  const colPath = type === 'room' ? ['rooms', currentRoom, 'messages', msgId] : ['dms', currentRoom, 'messages', msgId];
  const ref = doc(db, ...colPath);
  const snap = await getDoc(ref);
  if(!snap.exists()) return;
  const rx = snap.data().reactions || {};
  const uids = rx[emoji] || [];
  const field = 'reactions.' + emoji;
  if(uids.includes(currentUser.uid)) {
    await updateDoc(ref, { [field]: arrayRemove(currentUser.uid) });
  } else {
    await updateDoc(ref, { [field]: arrayUnion(currentUser.uid) });
  }
}

async function markRead(msgId, type) {
  const colPath = type === 'room' ? ['rooms', currentRoom, 'messages', msgId] : ['dms', currentRoom, 'messages', msgId];
  const ref = doc(db, ...colPath);
  try { await updateDoc(ref, { readBy: arrayUnion(currentUser.uid) }); } catch(e) {}
}

// ===== SEND =====
window.sendMessage = async function() {
  const inp = document.getElementById('msg-input');
  const text = inp.value.trim(); if(!text) return;
  inp.value = ''; inp.style.height = 'auto';
  const colPath = currentRoomType === 'room'
    ? collection(db, 'rooms', currentRoom, 'messages')
    : collection(db, 'dms', currentRoom, 'messages');
  const msgData = {
    author: currentUser.uid,
    text,
    ts: serverTimestamp(),
    readBy: [currentUser.uid],
    reactions: {}
  };
  if(replyTo) {
    msgData.replyTo = replyTo.id;
    msgData.replyToText = replyTo.text;

  }
};

async function sendTyping() {

window.addDM = async function() {
  const name = document.getElementById('dm-user-input').value.trim();
  if(!name) { document.getElementById('dm-err').textContent = '名前を入力してください'; return; }
  // find user by name
  const q = query(collection(db, 'users'), where('name', '==', name), limit(1));
  const snap = await getDocs(q);
  if(snap.empty) { document.getElementById('dm-err').textContent = 'このユーザーは見つかりません'; return; }
  const targetUid = snap.docs[0].id;
  if(targetUid === currentUser.uid) { document.getElementById('dm-err').textContent = '自分にDMは送れません'; return; }
  const members = [currentUser.uid, targetUid].sort();
  const dmId = 'dm_' + members.join('_');
  const dmRef = doc(db, 'dms', dmId);
  const existing = await getDoc(dmRef);
  if(!existing.exists()) {
    await setDoc(dmRef, { id: dmId, members, createdAt: serverTimestamp() });
    await addDoc(collection(db, 'dms', dmId, 'messages'), {
      type: 'system', text: 'DM開始', ts: serverTimestamp(), readBy: [], reactions: {}
    });
  }
  closeModal('dm-modal');
  document.getElementById('dm-user-input').value = '';
  openRoom(dmId, 'dm');
};

  currentRoom = null; currentRoomType = null;
  if(unsubMessages) unsubMessages();
  document.getElementById('empty-state').style.display = 'none';
  document.getElementById('chat-view').style.display = 'none';
  const ap = document.getElementById('account-page');
  ap.style.display = 'flex'; ap.style.flexDirection = 'column';
  if(membersOpen) { membersOpen = false; document.getElementById('members-panel').classList.remove('show'); }
  await loadAccountPage();
};
window.closeAccount = function() {
  document.getElementById('account-page').style.display = 'none';
  document.getElementById('empty-state').style.display = 'flex';
};

async function loadAccountPage() {
  const u = userCache[currentUser.uid] || {};
  const big = document.getElementById('acct-avatar-big'); big.innerHTML = '';
  if(u.photoURL) { const img = document.createElement('img'); img.src = u.photoURL; big.appendChild(img); }
  else { big.style.background = u.color; big.textContent = (u.name||'?')[0].toUpperCase(); }
  document.getElementById('acct-disp-name').textContent = u.name || '';
  document.getElementById('acct-disp-sub').textContent = currentUser.email || 'Googleアカウント';
  document.getElementById('acct-name-input').value = u.name || '';
  const isGoogle = currentUser.providerData[0]?.providerId === 'google.com';
  document.getElementById('color-field').style.display = isGoogle ? 'none' : 'block';
  document.getElementById('pass-section').style.display = isGoogle ? 'none' : 'block';
  if(!isGoogle) {
    const sw = document.getElementById('color-swatches'); sw.innerHTML = '';
    COLORS.forEach(c => {
      const d = document.createElement('div'); d.className = 'color-swatch' + (c === u.color ? ' selected' : '');
      d.style.background = c;
      d.onclick = () => { document.querySelectorAll('.color-swatch').forEach(x => x.classList.remove('selected')); d.classList.add('selected'); };
      sw.appendChild(d);
    });
  }
  setTheme(getTheme());
  // stats
  const roomsSnap = await getDocs(query(collection(db, 'rooms'), where('members', 'array-contains', currentUser.uid)));
  const dmsSnap = await getDocs(query(collection(db, 'dms'), where('members', 'array-contains', currentUser.uid)));
  document.getElementById('stat-rooms').textContent = roomsSnap.size;
  document.getElementById('stat-dms').textContent = dmsSnap.size;
  document.getElementById('stat-msgs').textContent = '-';
  // room list
  const rl = document.getElementById('acct-room-list'); rl.innerHTML = '';
  if(roomsSnap.empty) { rl.innerHTML = '<div style="color:var(--muted);font-size:13px;">参加中のルームはありません</div>'; return; }
  roomsSnap.forEach(d => {
    const r = d.data();
    const row = document.createElement('div'); row.className = 'joined-room-item';
    row.innerHTML = '<div class="joined-room-info"><div class="joined-room-name">' + escH(r.name) + '</div>'
      + '<div class="joined-room-id">' + escH(d.id) + '</div></div>'
      + '<button class="jr-btn" onclick="copyId(\'' + escH(d.id) + '\')">IDをコピー</button>'
      + '<button class="jr-btn danger" onclick="leaveRoom(\'' + escH(d.id) + '\')">退出</button>';
    rl.appendChild(row);
  });
}

window.copyId = function(rid) {
  navigator.clipboard.writeText(rid).then(() => showToast('ルームIDをコピーしました')).catch(() => prompt('ルームIDをコピーしてください:', rid));
};

window.saveProfile = async function() {
  const name = document.getElementById('acct-name-input').value.trim();
  if(!name) { showToast('名前を入力してください', true); return; }
  const sel = document.querySelector('.color-swatch.selected');
  const color = sel ? sel.style.background : (userCache[currentUser.uid]?.color || COLORS[0]);
  // 名前の重複チェック（自分以外）
  if(name !== userCache[currentUser.uid]?.name) {
    const nameCheck = query(collection(db, 'users'), where('name', '==', name), limit(1));
    const nameSnap = await getDocs(nameCheck);
    if(!nameSnap.empty) { showToast('この名前は既に使われています', true); return; }
  }
  await updateDoc(doc(db, 'users', currentUser.uid), { name, color });
  await updateProfile(currentUser, { displayName: name });
  userCache[currentUser.uid] = { ...userCache[currentUser.uid], name, color };
  updateMeUI(); loadAccountPage();
  showToast('プロフィールを保存しました');
};

window.changePassword = async function() {
  const newP = document.getElementById('new-pass-input').value;
  const err = document.getElementById('pass-err'); const ok = document.getElementById('pass-ok');
  err.textContent = ''; ok.textContent = '';
  if(newP.length < 6) { err.textContent = '6文字以上にしてください'; return; }
  try {
    await updatePassword(currentUser, newP);
    document.getElementById('new-pass-input').value = '';
    ok.textContent = 'パスワードを変更しました';
  } catch(e) { err.textContent = '変更に失敗しました。再ログインが必要な場合があります。'; }
};

window.leaveRoom = async function(rid) {
  await updateDoc(doc(db, 'rooms', rid), { members: arrayRemove(currentUser.uid) });
  await addDoc(collection(db, 'rooms', rid, 'messages'), {
    type: 'system', text: userCache[currentUser.uid]?.name + 'が退出しました',
    ts: serverTimestamp(), readBy: [], reactions: {}
  });
  loadAccountPage(); showToast('ルームから退出しました');
};

window.deleteAccount = async function() {
  if(!confirm('本当にアカウントを削除しますか？')) return;
  try { await deleteUser(currentUser); } catch(e) { showToast('再ログインが必要です', true); }
};

// ===== UTILS =====
window.openModal = function(id) { document.getElementById(id).classList.add('show'); };
window.closeModal = function(id) { document.getElementById(id).classList.remove('show'); };
document.querySelectorAll('.modal-overlay').forEach(el => {
  el.addEventListener('click', e => { if(e.target === el) el.classList.remove('show'); });
});
window.showToast = function(msg, warn) {
  document.getElementById('toast-msg').textContent = msg;
  const dot = document.getElementById('toast-dot'); dot.className = 'toast-dot' + (warn ? ' warn' : '');
  const t = document.getElementById('toast'); t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2600);
};
function escH(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function fmtTime(ts) {
  if(!ts) return '';
  const d = ts.toDate ? ts.toDate() : new Date(ts);
  const now = new Date();
  const hm = d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0');
  return d.toDateString() === now.toDateString() ? hm : (d.getMonth()+1) + '/' + d.getDate() + ' ' + hm;
}

// ===== INPUT =====
const mi = document.getElementById('msg-input');
mi.addEventListener('input', function() {
  this.style.height = 'auto'; this.style.height = Math.min(this.scrollHeight, 120) + 'px';
  sendTyping();
});
mi.addEventListener('keydown', function(e) { if(e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); window.sendMessage(); } });
['auth-email','auth-pass','auth-display-name'].forEach(id => {
  const el = document.getElementById(id);
  if(el) el.addEventListener('keydown', e => { if(e.key === 'Enter') window.doEmailAuth(); });
});
document.getElementById('join-room-id').addEventListener('keydown', e => { if(e.key === 'Enter') window.joinRoom(); });

// Service Worker登録
if('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/chat-app/sw.js').then(reg => {
    console.log('SW registered');
  }).catch(err => console.log('SW error:', err));
}

</script>
